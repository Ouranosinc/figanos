name: figanos
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python>=3.11,<3.15
  # Main
  - cartopy >=0.23.0
  - cairosvg >=2.6.0
  - matplotlib-base >=3.8.0
  - seaborn >=0.13.0
  - geopandas >=1.0
  - numpy >=1.25.0
  - pandas >=2.2.0
  - platformdirs >=4.0
  - pint >=0.18
  - pyyaml >=6.0.1
  - scikit-image >=0.21.0
  - xarray >=2023.11.0
  - xclim >=0.52.2
  - xsdba >=0.4.0
  - proj <9.8 #FIXME: tmp pin until cartopy fixes issue. See https://github.com/Ouranosinc/figanos/issues/386
  # Development
  - pip >=26.0.1
  - bump-my-version >=1.3.0
  - codespell >=2.4.1
  - coverage >=7.5.0
  - deptry >0.24.0
  - flake8 >=7.3.0
  - flake8-rst-docstrings >=0.4.0
  - flit >=3.11.0,<4.0
  - mypy >=1.19.1
  - numpydoc >=1.10.0
  - prek >=0.3.0
  - pytest >=9.0.2
  - pytest-cov >=7.0.0
  - tox >=4.41.0
  - tox-gh >=1.6.1
  - vulture >=2.14
  - watchdog >=6.0.0
  # Notebooks
  - dask
  - geoviews
  - h5py
  - holoviews
  - netcdf4
  - pooch >=1.8.0  # for xclim-testdata
  - zarr >=2.13.0
  # Docs
  - ipykernel
  - ipython >=8.5.0, !=9.0.0
  - jupyter_client
  - nbsphinx >=0.9.8
  - notebook
  - sphinx >=8.2.0
  - sphinx-book-theme >=1.0.0
  - sphinx-codeautolink >=0.16.2
  - sphinx-copybutton
  - sphinx-intl
